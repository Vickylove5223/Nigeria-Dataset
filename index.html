<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Free Nigeria Dataset API</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇳🇬</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Agbalumo&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#008751;--green-dark:#006d3f;--green-light:#e6f4ed;
  --bg:var(--green);--surface:#fff;--border:#e5e7eb;
  --text:#111827;--muted:#6b7280;--radius:10px;
  --font-heading: 'Agbalumo', system-ui;
  --bg-text:#ffffff;--bg-muted:rgba(255,255,255,0.7);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.site-content-wrapper{color:var(--text)} /* Ensure text inside cards stays dark */



/* HERO */
.hero{color:#fff;padding:48px 24px 40px;text-align:center}
.hero h1{font-family:var(--font-heading);font-size:clamp(40px,8vw,80px);font-weight:400;margin-bottom:16px;letter-spacing:-1px;line-height:1.1}
.hero p{font-size:20px;opacity:.88;max-width:680px;margin:0 auto 28px;line-height:1.6}


/* CONTAINER */
.container{max-width:1100px;margin:0 auto;padding:28px 20px;border-radius:var(--radius);border:1px solid rgba(255,255,255,0.05)}

/* MAIN TABS */
.main-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.tab{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;border:1.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);cursor:pointer;transition:all .15s;color:#fff}
.tab:hover{background:rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.3)}
.tab.active{background:var(--green-light);color:var(--green);border-color:var(--green-light)}

/* REGION BAR */
.region-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.rbtn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);cursor:pointer;transition:all .15s;color:#fff}
.rbtn:hover{background:rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.3)}
.rbtn.active{background:var(--green-light);color:var(--green);border-color:var(--green-light)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:20px}
.search-wrap input{width:100%;padding:10px 16px 10px 40px;border:1.5px solid rgba(255,255,255,0.2);border-radius:var(--radius);font-size:14px;background:rgba(255,255,255,0.1);outline:none;transition:all .15s;color:#fff}
.search-wrap input::placeholder{color:rgba(255,255,255,0.7)}
.search-wrap input:focus{border-color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.15)}
.search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.7);pointer-events:none}

/* SECTION HEAD */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-head h2{font-family:var(--font-heading);font-size:18px;font-weight:400;display:flex;align-items:center;gap:6px;color:#fff}
.badge{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.9);font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600}

/* STATE TABLE */
.st-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);background:#fff}
.st-table{width:100%;border-collapse:collapse;font-size:13px}
.st-table thead th{background:var(--green-light);color:var(--green);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;text-align:left;white-space:nowrap;border-bottom:2px solid rgba(0,135,81,.2)}
.st-table tbody tr{cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s}
.st-table tbody tr:last-child{border-bottom:none}
.st-table tbody tr:hover{background:#f0fdf4}
.st-table tbody tr.open{background:#e6f4ed}
.st-table td{padding:10px 12px;vertical-align:middle;white-space:nowrap}
.st-logo{width:36px;height:36px;border-radius:6px;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--green);overflow:hidden;border:1px solid rgba(0,135,81,.15)}
.st-logo img{width:100%;height:100%;object-fit:contain;padding:2px}
.st-name{font-weight:700;color:var(--text)}
.st-slogan{color:var(--muted);font-size:12px;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st-num{font-weight:700;color:var(--green);text-align:center}
.st-dash{color:#ccc;text-align:center}
.st-chevron{color:var(--muted);font-size:11px;transition:transform .2s;display:inline-block}
.st-table tbody tr.open .st-chevron{transform:rotate(180deg)}
.pc-badge{background:#f0fdf4;color:#166534;font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;border:1px solid #bbf7d0;font-family:monospace}

/* DETAIL PANEL */
.detail-row td{padding:0!important;border-bottom:2px solid var(--green)!important}
.detail-panel{display:none;padding:16px 20px;background:#fff}
.detail-panel.open{display:block}
.dp-tabs{display:flex;gap:6px;margin-bottom:14px;border-bottom:2px solid var(--border);padding-bottom:0}
.dp-tab{padding:7px 16px;font-size:12px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.dp-tab:hover{color:var(--green)}
.dp-tab.active{color:var(--green);border-bottom-color:var(--green)}
.dp-content{min-height:60px}
.lga-section{margin-bottom:12px}
.lga-header{font-weight:700;font-size:13px;color:var(--green);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.lga-postal{font-size:11px;font-weight:600;color:#166534;background:#f0fdf4;padding:2px 6px;border-radius:4px;border:1px solid #bbf7d0;font-family:monospace}
.towns-wrap{display:flex;flex-wrap:wrap;gap:6px}
.lga-panel{display:none;background:#fff;border-bottom:1px solid var(--border);padding:14px 18px 16px 76px;flex-direction:column;gap:10px}
.lga-panel.open{display:flex}
.town-tag{background:#fff;border:1px solid var(--border);font-size:11px;padding:3px 10px;border-radius:20px;color:var(--text);display:flex;align-items:center;gap:5px}
.town-tag .tpc{font-size:10px;color:var(--muted);font-family:monospace}
.dp-empty{color:var(--muted);font-size:13px;padding:12px 0}
.dp-table{width:100%;border-collapse:collapse;font-size:12px}
.dp-table th{background:#f3f4f6;padding:7px 10px;text-align:left;font-weight:700;color:var(--muted);font-size:11px;text-transform:uppercase}
.dp-table td{padding:7px 10px;border-bottom:1px solid var(--border);}
.dp-table tr:last-child td{border-bottom:none}

/* GRID CARDS (tribes/ethnic) */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.gcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.gcard-title{font-family:var(--font-heading);font-size:16px;font-weight:400;margin-bottom:6px}
.gcard-sub{font-size:12px;color:var(--muted);line-height:1.6}
.gcard-tag{display:inline-block;margin-top:8px;background:var(--green-light);color:var(--green);font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}

/* RELIGION */
.rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.rel-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.rel-name{font-family:var(--font-heading);font-size:18px;font-weight:400;margin-bottom:6px}
.rel-pct{font-size:28px;font-weight:800;color:var(--green);margin-bottom:8px}
.rel-bar-wrap{background:#e5e7eb;border-radius:20px;height:6px;margin-bottom:10px;overflow:hidden}
.rel-bar{background:var(--green);height:100%;border-radius:20px}
.rel-desc{font-size:12px;color:var(--muted);line-height:1.5}
.rel-tags{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px}
.rel-tag{background:#f3f4f6;font-size:11px;padding:2px 8px;border-radius:20px;color:var(--muted)}

/* POSTAL CODES TAB */
.pc-state{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.pc-state-header{background:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;border-bottom:1px solid var(--border)}
.pc-state-name{font-family:var(--font-heading);font-weight:400;font-size:16px;color:var(--green);flex:1}
.pc-base{font-family:monospace;font-size:13px;font-weight:700;color:#166534;background:#f0fdf4;padding:3px 8px;border-radius:4px;border:1px solid #bbf7d0}
.pc-lgas{display:none;padding:12px 16px}
.pc-lgas.open{display:block}
.pc-lga-row{margin-bottom:10px}
.pc-lga-name{font-weight:600;font-size:13px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.pc-towns-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.pc-town{background:#fff;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;display:flex;align-items:center;gap:6px}
.pc-town-code{font-family:monospace;font-size:11px;color:#166534;font-weight:700}

/* API TABLE */
.api-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.api-row{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
.api-row:last-child{border-bottom:none}
.method{font-size:11px;font-weight:800;padding:3px 9px;border-radius:4px;background:#dcfce7;color:#166534;flex-shrink:0;margin-top:2px}
.ep{font-family:monospace;font-size:13px;color:var(--green);flex:1;word-break:break-all}
.ep-desc{font-size:12px;color:var(--muted);width:100%;padding-left:52px}
.api-note{margin-top:12px;padding:14px 16px;background:var(--green-light);border-radius:var(--radius);font-size:13px;color:var(--green);font-weight:600}

/* FOOTER */
footer{padding:60px 24px;text-align:center;color:#fff;font-size:13px;opacity:.9}
footer a{color:#fff;text-decoration:none;font-weight:600}
footer a:hover{text-decoration:underline}

/* (Maker CSS removed) */

/* MODAL STYLES */
.modal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: none; z-index: 2000; align-items: center; justify-content: center;
  padding: 20px;
}
.modal.open { display: flex; }
.modal-backdrop {
  position: absolute; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
  animation: fadeIn 0.3s ease-out;
}
.modal-content {
  position: relative; background: #fff; width: 100%; max-width: 800px;
  max-height: 85vh; border-radius: 24px; overflow-y: auto;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
  animation: modalSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  padding: 30px;
  z-index: 2001;
  border: 1px solid rgba(255,255,255,0.2);
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes modalSlide {
  from { opacity: 0; transform: translateY(30px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-close {
  position: absolute; top: 20px; right: 20px; width: 36px; height: 36px;
  border-radius: 50%; background: #f3f4f6; border: none;
  font-size: 20px; cursor: pointer; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.modal-close:hover { background: #fee2e2; color: #ef4444; transform: rotate(90deg); }
.modal-header { margin-bottom: 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
.modal-title-h { font-family: var(--font-heading); font-size: 32px; color: var(--green); margin: 0; }
.modal-meta { font-size: 14px; color: var(--muted); margin-top: 4px; }
</style>
</head>
<body>




<div class="hero">
  <h1>Free Nigeria Dataset API</h1>
  <p>Browse all the 37 states, 774 LGAs, 860 tribes, 22 ethnic groups, 6 regions, 20 religions, Federal and State logos and postal codes in Nigeria.</p>

</div>

<div class="container">
  <!-- MAIN NAVIGATION TABS -->
  <div class="main-tabs">
    <button class="tab active" onclick="switchTab('states',this)">🗺️ States &amp; LGAs</button>
    <button class="tab" onclick="switchTab('logos',this)">🏛️ State Logos</button>
    <button class="tab" onclick="switchTab('postal',this)">📮 Postal Codes</button>
    <button class="tab" onclick="switchTab('tribes',this)">👥 Tribes</button>
    <button class="tab" onclick="switchTab('ethnic',this)">🌍 Ethnic Groups</button>
    <button class="tab" onclick="switchTab('religions',this)">🕌 Religions</button>
    <button class="tab" onclick="switchTab('api',this)">⚡ API Endpoints</button>
    <!-- Make Logo tab removed -->
  </div>

  <!-- REGION FILTER (states/logos only) -->
  <div id="regionBar" class="region-bar"></div>

  <!-- SEARCH -->
  <div id="searchWrap" class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="mainSearch" placeholder="Search…" oninput="filterData(this.value)"/>
  </div>

  <div id="content"></div>
</div>

<!-- Modal Container -->
<div id="stateModal" class="modal">
  <div class="modal-backdrop" onclick="closeModal()"></div>
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalHeader" class="modal-header"></div>
    <div id="modalTabs" class="dp-tabs"></div>
    <div id="modalBody" class="dp-content" style="padding-top: 10px;"></div>
  </div>
</div>

<footer>
  Built with ❤️ by <a href="https://ifeoluwaajetomobi.framer.website/" target="_blank">Ifeoluwa Ajetomobi</a>
  &nbsp;·&nbsp; <a href="https://github.com/Vickylove5223/Nigeria-Dataset" target="_blank">GitHub</a>
  &nbsp;·&nbsp; MIT License &nbsp;·&nbsp; Free &amp; Open Source
</footer>

<script>
let allData = {};
let currentTab = 'states';
let currentRegion = 'All';
let searchQuery = '';

async function loadData() {
  try {
    const r = await fetch('./data/nigeria-data.json');
    allData = await r.json();
    renderRegionBar();
    renderContent();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>Error loading data</p></div>';
  }
}

function renderRegionBar() {
  const regions = ['All', ...new Set(allData.states.map(s => s.region))];
  document.getElementById('regionBar').innerHTML = regions.map(r =>
    `<button class="rbtn ${r==='All'?'active':''}" onclick="filterByRegion('${r}',this)">${r}</button>`
  ).join('');
}

function filterByRegion(region, el) {
  currentRegion = region;
  document.querySelectorAll('.rbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderContent();
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  // show/hide region bar and search for relevant tabs
  const showRegion = tab === 'states' || tab === 'logos';
  document.getElementById('regionBar').style.display = showRegion ? 'flex' : 'none';
  document.getElementById('searchWrap').style.display = (tab === 'states' || tab === 'logos' || tab === 'postal' || tab === 'tribes') ? 'block' : 'none';
  renderContent();
}

function renderContent() {
  if (currentTab === 'states')    renderStates();
  else if (currentTab === 'logos')    renderLogos();
  else if (currentTab === 'postal')   renderPostal();
  else if (currentTab === 'lgas')     renderLGAs();
  else if (currentTab === 'tribes')   renderTribes();
  else if (currentTab === 'ethnic')   renderEthnic();
  else if (currentTab === 'religions') renderReligions();
  else if (currentTab === 'api')      renderAPI();
  // maker tab check removed
}

/* ── STATES & LGAs ── */
function renderStates() {
  let states = filteredStates();
  const content = document.getElementById('content');
  if (!states.length) { content.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>No states found</p></div>'; return; }

  content.innerHTML = `
    <div class="sec-head">
      <h2>🗺️ States &amp; LGAs</h2>
      <span class="badge">${states.length} states</span>
    </div>
    <div class="st-wrap">
      <table class="st-table">
        <thead>
          <tr>
            <th>Logo</th>
            <th>State Name</th>
            <th>Capital</th>
            <th>Slogan</th>
            <th>Year</th>
            <th class="st-num">LGs</th>
            <th class="st-num">Towns</th>
            <th class="st-num">Wards</th>
            <th class="st-num">PU</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${states.map((state, idx) => {
            const lgNo = state.lgas.length;
            const townNo = state.lgas.reduce((s,l) => s + (l.towns ? l.towns.length : 0), 0);
            const wardNo = state.wardCount || 0;
            const puNo = state.pollingUnitsCount || 0;
            const logoHtml = state.logo 
              ? `<img src="${state.logo}" alt="${state.name}" onerror="this.parentElement.textContent='${state.name.substring(0,2).toUpperCase()}'">`
              : state.name.substring(0,2).toUpperCase();
            
            return `
            <tr id="sr-${idx}" onclick="toggleDetail(${idx})">
              <td><div class="st-logo">${logoHtml}</div></td>
              <td class="st-name">${state.name}</td>
              <td>${state.capital}</td>
              <td class="st-slogan" title="${state.slogan}">${state.slogan || '—'}</td>
              <td>${state.yearCreated || '—'}</td>
              <td class="st-num">${lgNo}</td>
              <td class="st-num">${townNo}</td>
              <td class="st-num">${wardNo > 0 ? wardNo : '<span class="st-dash">—</span>'}</td>
              <td class="st-num">${puNo > 0 ? puNo : '<span class="st-dash">—</span>'}</td>
              <td><span class="st-chevron">▶</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

function toggleDetail(idx) {
  const states = filteredStates();
  const state = states[idx];
  if (!state) return;

  const modal = document.getElementById('stateModal');
  const header = document.getElementById('modalHeader');
  const tabs = document.getElementById('modalTabs');
  const body = document.getElementById('modalBody');

  const logoHtml = state.logo 
    ? `<img src="${state.logo}" alt="${state.name}" style="width:100%;height:100%;object-fit:contain" onerror="this.parentElement.textContent='${state.name.substring(0,2).toUpperCase()}'">`
    : state.name.substring(0,2).toUpperCase();

  header.innerHTML = `
    <div class="st-logo" style="width:60px; height:60px; font-size:18px;">${logoHtml}</div>
    <div>
      <h2 class="modal-title-h">${state.name}</h2>
      <div class="modal-meta">${state.capital} &sdot; ${state.region} &sdot; Established ${state.yearCreated || '—'}</div>
    </div>
  `;

  tabs.innerHTML = `
    <button class="dp-tab active" onclick="renderDetailTab(${idx}, 'lgas', this, event)">LGs</button>
    <button class="dp-tab" onclick="renderDetailTab(${idx}, 'towns', this, event)">Towns</button>
    <button class="dp-tab" onclick="renderDetailTab(${idx}, 'wards', this, event)">Wards</button>
    <button class="dp-tab" onclick="renderDetailTab(${idx}, 'polling', this, event)">Polling Units</button>
    <button class="dp-tab" onclick="renderDetailTab(${idx}, 'postal', this, event)">Postal Codes</button>
  `;

  // Filter out any detail rows from original logic if they exist
  body.innerHTML = '';
  modal.classList.add('open');
  document.body.style.overflow = 'hidden'; // Prevent scroll

  // Default show first tab
  renderDetailTab(idx, 'lgas', tabs.querySelector('.dp-tab'), null);
}

function closeModal() {
  document.getElementById('stateModal').classList.remove('open');
  document.body.style.overflow = '';
}

// Close on Escape
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

function renderDetailTab(idx, type, el, ev) {
  if (ev) ev.stopPropagation();
  const state = filteredStates()[idx];
  const container = document.getElementById(`modalBody`);
  const tabs = document.getElementById(`modalTabs`);
  
  // Update state active class
  tabs.querySelectorAll('.dp-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  
  let html = '';
  if (type === 'lgas') {
    html = `<div class="towns-wrap">
      ${state.lgas.map(l => `<div class="town-tag" style="padding:6px 12px; font-weight:600">📌 ${l.name}</div>`).join('')}
    </div>`;
  } 
  else if (type === 'towns') {
    state.lgas.forEach(l => {
      if (l.towns && l.towns.length) {
        html += `<div class="lga-section">
          <div class="lga-header">📌 ${l.name} <span class="badge">${l.towns.length} towns</span></div>
          <div class="towns-wrap">
            ${l.towns.map(t => `<div class="town-tag">${typeof t === 'string' ? t : t.name}</div>`).join('')}
          </div>
        </div>`;
      }
    });
  }
  else if (type === 'wards') {
    state.lgas.forEach(l => {
      const wards = l.wards || [];
      if (wards.length) {
        html += `<div class="lga-section">
          <div class="lga-header" style="color:#1e40af">🛡️ ${l.name} <span class="badge">${wards.length} wards</span></div>
          <div class="towns-wrap">
            ${wards.map(w => `<div class="town-tag" style="border-color:#bfdbfe; background:#eff6ff">${w.replace(/-/g,' ')}</div>`).join('')}
          </div>
        </div>`;
      }
    });
    if (!html) html = '<div class="dp-empty">No ward list available for this state.</div>';
  }
  else if (type === 'polling') {
    html = `<div style="background:var(--green-light); padding:16px; border-radius:10px; color:var(--green)">
      <div style="font-size:14px; margin-bottom:10px">Total Polling Units in <strong>${state.name}</strong>:</div>
      <div style="font-size:32px; font-weight:800">${state.pollingUnitsCount || '—'}</div>
      <div style="font-size:12px; opacity:0.8; margin-top:10px">List of specific polling units is available via API or individual LGA export to ensure performance.</div>
    </div>`;
  }
  else if (type === 'postal') {
    html = `<table class="dp-table">
      <thead><tr><th>LGA</th><th>Base Code</th><th>Towns/Districts</th></tr></thead>
      <tbody>
        ${state.lgas.map(l => `
          <tr>
            <td><strong>${l.name}</strong></td>
            <td><span class="pc-badge">${l.postalCode || state.postalCode}</span></td>
            <td>
              <div class="towns-wrap">
                ${(l.towns||[]).map(t => `
                  <div class="town-tag" style="font-size:10px">
                    ${typeof t === 'string' ? t : t.name} ${t.postalCode ? `<span class="tpc">${t.postalCode}</span>` : ''}
                  </div>`).join('')}
              </div>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`;
  }
  
  container.innerHTML = html || '<div class="dp-empty">Data coming soon.</div>';
}

/* ── LOGOS ── */
function renderLogos() {
  let states = filteredStates();
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="sec-head">
      <h2>🏛️ State Logos / Emblems</h2>
      <span class="badge">${states.length} states</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px">
      ${states.map(state => `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center">
          <div style="width:80px;height:80px;margin:0 auto 10px;border-radius:8px;background:var(--green-light);display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid rgba(0,135,81,.15)">
            ${state.logo
              ? `<img src="${state.logo}" alt="${state.name}" style="width:100%;height:100%;object-fit:contain;padding:4px" onerror="this.parentElement.innerHTML='<span style=font-size:22px;font-weight:800;color:var(--green)>${state.name.substring(0,2).toUpperCase()}</span>'">`
              : `<span style="font-size:22px;font-weight:800;color:var(--green)">${state.name.substring(0,2).toUpperCase()}</span>`}
          </div>
          <div style="font-weight:700;font-size:13px;margin-bottom:3px">${state.name}</div>
        </div>`).join('')}
    </div>`;
}

/* ── POSTAL CODES ── */
function renderPostal() {
  let states = allData.states;
  if (searchQuery) states = states.filter(s => s.name.toLowerCase().includes(searchQuery.toLowerCase()) || s.lgas.some(l => l.name && l.name.toLowerCase().includes(searchQuery.toLowerCase())));
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="sec-head">
      <h2>📮 Postal Codes</h2>
      <span class="badge">${states.length} states · 774 LGAs · 860+ towns</span>
    </div>
    <div style="background:var(--green-light);border:1px solid rgba(0,135,81,.2);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--green)">
      📋 <strong>Format:</strong> 6-digit NIPOST code — <code style="background:#fff;padding:1px 5px;border-radius:3px">RRDDTTT</code> &nbsp;|&nbsp; R=Region · D=District · T=Town
    </div>
    ${states.map((state, si) => `
      <div class="pc-state">
        <div class="pc-state-header" onclick="togglePC(${si})">
          <div style="width:32px;height:32px;border-radius:6px;background:var(--surface);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0">
            ${state.logo ? `<img src="${state.logo}" style="width:100%;height:100%;object-fit:contain;padding:2px" onerror="this.parentElement.textContent='${state.name.substring(0,2).toUpperCase()}'">` : `<span style="font-size:11px;font-weight:800;color:var(--green)">${state.name.substring(0,2).toUpperCase()}</span>`}
          </div>
          <span class="pc-state-name">${state.name} — ${state.capital}</span>
          <span class="pc-base">${state.postalCode || '—'}</span>
          <span style="color:var(--muted);font-size:13px;margin-left:8px">▼</span>
        </div>
        <div class="pc-lgas" id="pc-${si}">
          ${state.lgas.map(lga => `
            <div class="pc-lga-row">
              <div class="pc-lga-name">
                📌 ${lga.name}
                ${lga.postalCode ? `<span class="pc-base" style="font-size:11px">${lga.postalCode}</span>` : ''}
              </div>
              <div class="pc-towns-grid">
                ${(lga.towns||[]).map(t => `
                  <div class="pc-town">
                    <span>${typeof t === 'string' ? t : (t.name || 'Unknown')}</span>
                    <span class="pc-town-code">${t.postalCode || ''}</span>
                  </div>`).join('')}
              </div>
            </div>`).join('')}
        </div>
      </div>`).join('')}`;
}

function togglePC(si) {
  const el = document.getElementById(`pc-${si}`);
  el.classList.toggle('open');
}


/* ── TRIBES ── */
function renderTribes() {
  const tribes = (allData.tribes || []).filter(t => !searchQuery || t.name.toLowerCase().includes(searchQuery.toLowerCase()));
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="sec-head"><h2>👥 Tribes</h2><span class="badge">${tribes.length} tribes</span></div>
    <div class="grid">
      ${tribes.map(t => `
        <div class="gcard">
          <div class="gcard-title">${t.name}</div>
          <div class="gcard-sub">
            <strong>Region:</strong> ${t.region}<br>
            <strong>Population:</strong> ${t.population}<br>
            <strong>States:</strong> ${t.states.join(', ')}
          </div>
          <span class="gcard-tag">${t.region}</span>
        </div>`).join('')}

}

function renderEthnic() {
  const groups = allData.ethnicGroups || [];

  content.innerHTML = `
    <div class="sec-head"><h2>🌍 Ethnic Groups</h2><span class="badge">${groups.length} groups</span></div>

/* ── RELIGIONS ── */
function renderReligions() {
  const religions = allData.religions || [];

  content.innerHTML = `
    <div class="sec-head"><h2>🕌 Religions</h2><span class="badge">${religions.length} religions</span></div>

/* ── API ENDPOINTS ── */
function renderAPI() {
  const base = window.location.origin;
  const endpoints = [
    ['/api/states','Get all 37 states with LGAs, towns and postal codes'],
    ['/api/states/:name','Get a specific state (e.g. /api/states/Lagos)'],
    ['/api/lgas','Get all LGAs across Nigeria'],
    ['/api/lgas/:state','Get LGAs for a specific state'],
    ['/api/regions','Get all geopolitical regions'],
    ['/api/regions/:region','Get states in a region'],
    ['/api/tribes','Get all tribes'],
    ['/api/ethnic-groups','Get all ethnic groups'],
    ['/api/religions','Get all religions'],
    ['/api/postal-codes','Get complete postal codes database'],
    ['/api/postal-codes/state/:state','Get postal codes for a state'],
    ['/api/postal-codes/state/:state/lga/:lga','Get postal codes for an LGA'],
    ['/api/postal-codes/town/:town','Search postal codes by town name'],
    ['/api/postal-codes/lookup/:code','Reverse lookup — find town by postal code'],

  ];
  document.getElementById('content').innerHTML = `

    <div class="api-table">
      ${endpoints.map(([ep, desc]) => `
        <div class="api-row">
          <span class="method">GET</span>

          <span class="ep-desc">${desc}</span>
        </div>`).join('')}
    </div>
    <div class="api-note">💡 Base URL: <strong>${base}</strong> &nbsp;·&nbsp; All responses are JSON &nbsp;·&nbsp; CORS enabled</div>`;
}

// Logo maker rendering and helper functions removed

/* ── HELPERS ── */
function filteredStates() {
  let states = allData.states || [];
  if (currentRegion !== 'All') states = states.filter(s => s.region === currentRegion);
  if (searchQuery) states = states.filter(s =>
    s.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
    s.capital.toLowerCase().includes(searchQuery.toLowerCase())
  );
  return states;
}

function filteredLGAs() {
  let states = allData.states || [];
  if (currentRegion !== 'All') states = states.filter(s => s.region === currentRegion);
  if (searchQuery) {
    states = states.filter(s => 
      s.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
      s.lgas.some(l => l.name && l.name.toLowerCase().includes(searchQuery.toLowerCase()))
    );
  }
  return states;
}

function filterData(q) {
  searchQuery = q;
  renderContent();
}

function syncSearch(q) {
  document.getElementById('mainSearch').value = q;
  filterData(q);
}

document.addEventListener('DOMContentLoaded', loadData);
</script>
