<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Nigeria Free Data API — by Ifeoluwa Ajetomobi</title>
<meta name="description" content="Interactive explorer for Nigerian states, 774 LGAs, tribes, ethnic groups and religions. Free dataset by Ifeoluwa Ajetomobi."/>
<meta name="author" content="Ifeoluwa Ajetomobi"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f8;--surface:#fff;--border:#e5e7eb;
  --green:#008751;--green-light:#e6f4ed;--green-dark:#006d3f;
  --text:#111827;--muted:#6b7280;--tag:#f3f4f6;--radius:10px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.logo{font-weight:800;font-size:17px;color:var(--green);display:flex;align-items:center;gap:8px;white-space:nowrap}
.logo-flag{font-size:22px}
.header-search{flex:1;max-width:440px;margin-left:auto;position:relative}
.header-search input{width:100%;padding:8px 14px 8px 36px;border:1px solid var(--border);border-radius:20px;font-size:14px;background:var(--bg);outline:none;transition:border .15s}
.header-search input:focus{border-color:var(--green)}
.hs-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}

/* HERO */
.hero{background:linear-gradient(135deg,#005c36 0%,#008751 60%,#00a862 100%);color:#fff;padding:48px 24px 40px;text-align:center}
.hero h1{font-size:clamp(24px,4vw,38px);font-weight:800;margin-bottom:10px}
.hero p{font-size:15px;opacity:.88;max-width:560px;margin:0 auto 28px}
.hero-stats{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.hstat{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:10px;padding:12px 20px;min-width:110px;text-align:center;backdrop-filter:blur(4px)}
.hstat-num{font-size:26px;font-weight:800;line-height:1}
.hstat-lbl{font-size:11px;opacity:.8;margin-top:3px;text-transform:uppercase;letter-spacing:.5px}

/* MAIN */
.container{max-width:960px;margin:0 auto;padding:28px 20px}

/* TABS */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.tab{padding:7px 18px;border-radius:20px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s;color:var(--muted)}
.tab:hover{border-color:var(--green);color:var(--green)}
.tab.active{background:var(--green);color:#fff;border-color:var(--green)}

/* REGION FILTER */
.region-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.rbtn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s;color:var(--muted)}
.rbtn:hover{border-color:var(--green);color:var(--green)}
.rbtn.active{background:var(--green-light);color:var(--green);border-color:var(--green)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:20px}
.search-wrap input{width:100%;padding:10px 16px 10px 40px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--surface);outline:none;transition:border .15s}
.search-wrap input:focus{border-color:var(--green)}
.search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}

/* SECTION HEADING */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-head h2{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}
.badge{background:var(--tag);color:var(--muted);font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600}
.hint{font-size:12px;color:var(--muted)}

/* STATE CARDS */
.card-list{display:flex;flex-direction:column;gap:1px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.scard{background:var(--surface);padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border)}
.scard:last-child{border-bottom:none}
.scard:hover{background:#fafafa}
.scard.open{background:var(--green-light)}
.avatar{width:42px;height:42px;border-radius:8px;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--green);flex-shrink:0}
.scard-body{flex:1;min-width:0}
.scard-name{font-size:15px;font-weight:700;margin-bottom:3px}
.scard-meta{font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
.scard-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lga-pill{background:var(--green-light);color:var(--green);font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
.region-pill{background:var(--tag);color:var(--muted);font-size:11px;padding:3px 8px;border-radius:20px}
.chevron{color:var(--muted);transition:transform .2s;font-size:14px}
.scard.open .chevron{transform:rotate(180deg)}

/* LGA EXPAND */
.lga-panel{display:none;background:#f9fafb;border-bottom:1px solid var(--border);padding:12px 18px 14px 74px;flex-wrap:wrap;gap:6px}
.lga-panel.open{display:flex}
.lga-tag{background:var(--surface);border:1px solid var(--border);font-size:12px;padding:4px 11px;border-radius:20px;color:var(--text)}

/* GRID CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.gcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.gcard-title{font-size:14px;font-weight:700;margin-bottom:5px}
.gcard-sub{font-size:12px;color:var(--muted);line-height:1.5}
.gcard-pop{display:inline-block;margin-top:8px;background:var(--green-light);color:var(--green);font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}

/* RELIGION CARDS */
.rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.rel-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.rel-name{font-size:16px;font-weight:800;margin-bottom:6px}
.rel-pct{font-size:28px;font-weight:800;color:var(--green);margin-bottom:8px}
.rel-bar-wrap{background:#e5e7eb;border-radius:20px;height:6px;margin-bottom:10px;overflow:hidden}
.rel-bar{background:var(--green);height:100%;border-radius:20px;transition:width .6s ease}
.rel-desc{font-size:12px;color:var(--muted);line-height:1.5}
.rel-regions{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px}
.rel-region-tag{background:var(--tag);font-size:11px;padding:2px 8px;border-radius:20px;color:var(--muted)}

/* API TABLE */
.api-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.api-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.api-row:last-child{border-bottom:none}
.method{font-size:11px;font-weight:800;padding:3px 9px;border-radius:4px;background:#dcfce7;color:#166534;flex-shrink:0}
.ep{font-family:monospace;font-size:13px;flex:1;word-break:break-all;color:var(--green)}
.ep-desc{font-size:12px;color:var(--muted);width:100%;padding-left:52px}
.api-note{margin-top:12px;padding:14px 16px;background:var(--green-light);border-radius:var(--radius);font-size:13px;color:var(--green);font-weight:600}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:10px}

/* AUTHOR STRIP */
.author-strip{background:var(--surface);border-top:1px solid var(--border);padding:28px 24px;margin-top:40px}
.author-inner{max-width:960px;margin:0 auto;display:flex;flex-wrap:wrap;align-items:center;gap:20px}
.author-text{flex:1;min-width:220px}
.author-name{font-size:18px;font-weight:800;margin-bottom:3px}
.author-role{font-size:13px;color:var(--green);font-weight:600;margin-bottom:6px}
.author-bio{font-size:13px;color:var(--muted);max-width:480px;line-height:1.6}
.author-btns{display:flex;gap:10px;flex-wrap:wrap}
.btn-primary{background:var(--green);color:#fff;padding:10px 22px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:700;transition:background .15s}
.btn-primary:hover{background:var(--green-dark)}
.btn-secondary{background:var(--tag);color:var(--text);padding:10px 22px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:700;transition:background .15s}
.btn-secondary:hover{background:#e5e7eb}

footer{text-align:center;padding:20px;font-size:12px;color:var(--muted);border-top:1px solid var(--border)}
footer a{color:var(--green);text-decoration:none}

@media(max-width:600px){
  .hero{padding:32px 16px 28px}
  .hstat{min-width:90px;padding:10px 14px}
  .region-pill{display:none}
  .ep-desc{padding-left:0}
}
</style>
</head>
<body>

<header>
  <div class="logo"> Nigeria Free Data API</div>
  <div class="header-search">
    <svg class="hs-icon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="headerSearch" placeholder="Search states, LGAs, tribes…" oninput="syncSearch(this.value)"/>
  </div>
</header>

<div class="hero">
  <h1>Nigeria Data Explorer</h1>
  <p>Browse all Nigerian states, LGAs, tribes, ethnic groups and religions — free to use in your projects.</p>
  <div class="hero-stats">
    <div class="hstat"><div class="hstat-num">37</div><div class="hstat-lbl">States</div></div>
    <div class="hstat"><div class="hstat-num">774</div><div class="hstat-lbl">LGAs</div></div>
    <div class="hstat"><div class="hstat-num">22+</div><div class="hstat-lbl">Tribes</div></div>
    <div class="hstat"><div class="hstat-num">6</div><div class="hstat-lbl">Regions</div></div>
    <div class="hstat"><div class="hstat-num">100%</div><div class="hstat-lbl">Free</div></div>
  </div>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('states',this)">🗺️ States &amp; LGAs</button>
    <button class="tab" onclick="switchTab('tribes',this)">👥 Tribes</button>
    <button class="tab" onclick="switchTab('ethnic',this)">🌍 Ethnic Groups</button>
    <button class="tab" onclick="switchTab('religions',this)">🕌 Religions</button>
    <button class="tab" onclick="switchTab('api',this)">⚡ API Endpoints</button>
  </div>

  <div id="regionBar" class="region-bar"></div>

  <div id="searchWrap" class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="mainSearch" placeholder="Search…" oninput="filterData(this.value)"/>
  </div>

  <div id="content"></div>
</div>
