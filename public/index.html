<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nigeria Data API</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --border: #e5e7eb;
      --primary: #008751;
      --primary-light: #e6f4ed;
      --text: #111827;
      --muted: #6b7280;
      --tag-bg: #f3f4f6;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-weight: 700; font-size: 18px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
    .logo span { font-size: 22px; }
    .header-search { flex: 1; max-width: 420px; margin-left: auto; position: relative; }
    .header-search input {
      width: 100%; padding: 8px 14px 8px 36px;
      border: 1px solid var(--border); border-radius: 20px;
      font-size: 14px; background: var(--bg); outline: none;
    }
    .header-search input:focus { border-color: var(--primary); }
    .header-search svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); }

    .container { max-width: 900px; margin: 0 auto; padding: 32px 20px; }

    .page-title { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
    .page-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

    .stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 28px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 20px;
      display: flex; align-items: center; gap: 10px; flex: 1; min-width: 140px;
    }
    .stat-icon { font-size: 22px; }
    .stat-value { font-size: 20px; font-weight: 700; line-height: 1; }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
    .tab {
      padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500;
      border: 1px solid var(--border); background: var(--surface);
      cursor: pointer; transition: all .15s;
    }
    .tab:hover { border-color: var(--primary); color: var(--primary); }
    .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .search-bar { position: relative; margin-bottom: 20px; }
    .search-bar input {
      width: 100%; padding: 10px 16px 10px 40px;
      border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 14px; background: var(--surface); outline: none;
    }
    .search-bar input:focus { border-color: var(--primary); }
    .search-bar svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); }

    .section-heading {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
    }
    .section-heading h2 { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .count-badge { background: var(--tag-bg); color: var(--muted); font-size: 12px; padding: 2px 8px; border-radius: 20px; }

    .cards { display: flex; flex-direction: column; gap: 1px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 0; padding: 16px 18px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; transition: background .12s;
    }
    .cards .card:first-child { border-radius: var(--radius) var(--radius) 0 0; }
    .cards .card:last-child { border-radius: 0 0 var(--radius) var(--radius); }
    .cards .card:only-child { border-radius: var(--radius); }
    .card:hover { background: var(--bg); }

    .card-avatar {
      width: 44px; height: 44px; border-radius: 8px;
      background: var(--primary-light); display: flex; align-items: center;
      justify-content: center; font-size: 16px; flex-shrink: 0;
      font-weight: 700; color: var(--primary);
    }
    .card-body { flex: 1; min-width: 0; }
    .card-title { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
    .card-meta { font-size: 12px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; }

    .card-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .lga-count { background: var(--primary-light); color: var(--primary); font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .region-tag { background: var(--tag-bg); color: var(--muted); font-size: 11px; padding: 3px 8px; border-radius: 20px; }

    .lga-list {
      display: none; background: var(--bg);
      border: 1px solid var(--border); border-top: none;
      padding: 14px 18px; flex-wrap: wrap; gap: 6px;
    }
    .lga-list.open { display: flex; }
    .lga-tag { background: var(--surface); border: 1px solid var(--border); font-size: 12px; padding: 4px 10px; border-radius: 20px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
    .grid-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
    .grid-card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .grid-card-sub { font-size: 12px; color: var(--muted); }

    .api-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 10px; }
    .api-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .api-row:last-child { border-bottom: none; }
    .method { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; background: #dcfce7; color: #166534; flex-shrink: 0; }
    .endpoint { font-family: monospace; font-size: 13px; flex: 1; word-break: break-all; }
    .endpoint-desc { font-size: 12px; color: var(--muted); }

    .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty-icon { font-size: 40px; margin-bottom: 10px; }

    .loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 15px; }

    footer { text-align: center; padding: 32px 20px; font-size: 13px; color: var(--muted); border-top: 1px solid var(--border); margin-top: 40px; }
    footer a { color: var(--primary); text-decoration: none; }

    @media (max-width: 600px) {
      .stat-card { min-width: 120px; }
      .region-tag { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo"><span>🇳🇬</span> Nigeria Data API</div>
  <div class="header-search">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="headerSearch" placeholder="Search states, LGAs, tribes…" oninput="syncSearch(this.value)" />
  </div>
</header>

<div class="container">
  <div class="page-title">Nigeria Data Explorer</div>
  <div class="page-subtitle">Browse all Nigerian states, LGAs, tribes, ethnic groups and religions — free to use in your projects.</div>

  <div class="stats" id="statsBar"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('states', this)">🗺️ States &amp; LGAs</button>
    <button class="tab" onclick="switchTab('tribes', this)">👥 Tribes</button>
    <button class="tab" onclick="switchTab('ethnic', this)">🌍 Ethnic Groups</button>
    <button class="tab" onclick="switchTab('religions', this)">🕌 Religions</button>
    <button class="tab" onclick="switchTab('api', this)">⚡ API Endpoints</button>
  </div>

  <div class="search-bar" id="searchWrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="mainSearch" placeholder="Search datasets…" oninput="filterData(this.value)" />
  </div>

  <div class="tabs" id="regionTabs" style="margin-bottom:16px;"></div>

  <div id="content"><div class="loading">⏳ Loading data…</div></div>
</div>

<footer>
  Built with ❤️ for Nigeria &nbsp;·&nbsp;
  <a href="https://github.com" target="_blank">View on GitHub</a> &nbsp;·&nbsp;
  Free &amp; Open Source · MIT License
</footer>

<script>
  let DATA = {};
  let currentTab = 'states';
  let currentRegion = 'All';
  let currentSearch = '';

  // Try multiple paths to find the JSON
  const dataPaths = [
    '../data/nigeria-data.json',
    './data/nigeria-data.json',
    '/data/nigeria-data.json'
  ];

  async function loadData() {
    for (const path of dataPaths) {
      try {
        const res = await fetch(path);
        if (res.ok) {
          DATA = await res.json();
          init();
          return;
        }
      } catch(e) {}
    }
    document.getElementById('content').innerHTML =
      '<div class="empty"><div class="empty-icon">⚠️</div>Could not load nigeria-data.json. Make sure the data folder is accessible.</div>';
  }

  loadData();

  function init() {
    renderStats();
    renderRegionTabs();
    renderTab();
  }

  function renderStats() {
    const m = DATA.metadata || {};
    const tribes = (DATA.tribes || []).length;
    const religions = (DATA.religions || []).length;
    const items = [
      { icon: '🗺️', value: m.totalStates || (DATA.states || []).length, label: 'States & FCT' },
      { icon: '📍', value: m.totalLGAs || 774, label: 'Local Govt Areas' },
      { icon: '👥', value: tribes > 0 ? tribes : '250+', label: 'Tribes' },
      { icon: '🕌', value: religions > 0 ? religions : '—', label: 'Religions' },
    ];
    document.getElementById('statsBar').innerHTML = items.map(i => `
      <div class="stat-card">
        <div class="stat-icon">${i.icon}</div>
        <div>
          <div class="stat-value">${i.value}</div>
          <div class="stat-label">${i.label}</div>
        </div>
      </div>`).join('');
  }

  const REGIONS = ['All','North West','North East','North Central','South West','South East','South South'];

  function renderRegionTabs() {
    document.getElementById('regionTabs').innerHTML = REGIONS.map(r => `
      <button class="tab ${r === currentRegion ? 'active' : ''}" onclick="setRegion('${r}', this)">${r}</button>
    `).join('');
  }

  function setRegion(r, el) {
    currentRegion = r;
    document.querySelectorAll('#regionTabs .tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderTab();
  }

  function switchTab(tab, el) {
    currentTab = tab;
    currentSearch = '';
    document.getElementById('mainSearch').value = '';
    document.getElementById('headerSearch').value = '';
    document.querySelectorAll('.tabs:first-of-type .tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('regionTabs').style.display = tab === 'states' ? 'flex' : 'none';
    document.getElementById('searchWrap').style.display = tab === 'api' ? 'none' : 'flex';
    renderTab();
  }

  function syncSearch(val) {
    currentSearch = val;
    document.getElementById('mainSearch').value = val;
    renderTab();
  }

  function filterData(val) {
    currentSearch = val;
    document.getElementById('headerSearch').value = val;
    renderTab();
  }

  function renderTab() {
    const el = document.getElementById('content');
    if (currentTab === 'states') el.innerHTML = renderStates();
    else if (currentTab === 'tribes') el.innerHTML = renderGrid(DATA.tribes || [], '👥', 'Tribes');
    else if (currentTab === 'ethnic') el.innerHTML = renderGrid(DATA.ethnicGroups || [], '🌍', 'Ethnic Groups');
    else if (currentTab === 'religions') el.innerHTML = renderGrid(DATA.religions || [], '🕌', 'Religions');
    else if (currentTab === 'api') el.innerHTML = renderAPI();
  }

  function renderStates() {
    let states = DATA.states || [];
    if (currentRegion !== 'All') states = states.filter(s => s.region === currentRegion);
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      states = states.filter(s =>
        s.name.toLowerCase().includes(q) ||
        s.capital.toLowerCase().includes(q) ||
        s.region.toLowerCase().includes(q) ||
        (s.lgas || []).some(l => l.toLowerCase().includes(q))
      );
    }
    if (!states.length) return emptyState('No states match your search.');

    const cards = states.map(s => {
      const lgas = s.lgas || [];
      const lgaTags = lgas.map(l => `<span class="lga-tag">${l}</span>`).join('');
      return `
        <div class="card" onclick="toggleLGAs('lga-${s.id}')">
          <div class="card-avatar">${s.name.slice(0,2).toUpperCase()}</div>
          <div class="card-body">
            <div class="card-title">${s.name}</div>
            <div class="card-meta">
              <span>🏛️ ${s.capital}</span>
              <span>📅 Est. ${s.created}</span>
              <span>💬 ${s.slogan}</span>
            </div>
          </div>
          <div class="card-right">
            <span class="lga-count">${lgas.length} LGAs</span>
            <span class="region-tag">${s.region}</span>
          </div>
        </div>
        <div class="lga-list" id="lga-${s.id}">${lgaTags}</div>`;
    }).join('');

    return `
      <div class="section-heading">
        <h2>📊 States &amp; LGAs <span class="count-badge">${states.length} states</span></h2>
        <span style="font-size:12px;color:var(--muted)">Click a state to expand LGAs</span>
      </div>
      <div class="cards">${cards}</div>`;
  }

  function toggleLGAs(id) {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('open');
  }

  function renderGrid(items, icon, label) {
    if (!items.length) return emptyState(`No ${label.toLowerCase()} data available in the JSON yet.`);
    let filtered = items;
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      filtered = items.filter(i => JSON.stringify(i).toLowerCase().includes(q));
    }
    if (!filtered.length) return emptyState(`No ${label.toLowerCase()} match your search.`);

    const cards = filtered.map(item => {
      const name = typeof item === 'string' ? item : (item.name || item.tribe || item.group || item.religion || Object.values(item)[0]);
      const sub = typeof item === 'object' ? (item.region || item.language || item.description || '') : '';
      return `
        <div class="grid-card">
          <div class="grid-card-title">${icon} ${name}</div>
          ${sub ? `<div class="grid-card-sub">${Array.isArray(sub) ? sub.join(', ') : sub}</div>` : ''}
        </div>`;
    }).join('');

    return `
      <div class="section-heading">
        <h2>${icon} ${label} <span class="count-badge">${filtered.length}</span></h2>
      </div>
      <div class="grid">${cards}</div>`;
  }

  function renderAPI() {
    const endpoints = [
      ['/api/states', 'Get all 37 states with their LGAs'],
      ['/api/states/:name', 'Get a specific state by name'],
      ['/api/lgas', 'Get all 774 LGAs'],
      ['/api/lgas/:state', 'Get LGAs for a specific state'],
      ['/api/wards/:lga', 'Get wards for a specific LGA'],
      ['/api/tribes', 'Get all tribes'],
      ['/api/ethnic-groups', 'Get all ethnic groups'],
      ['/api/religions', 'Get all religions'],
    ];
    const rows = endpoints.map(([ep, desc]) => `
      <div class="api-row">
        <span class="method">GET</span>
        <span class="endpoint">${ep}</span>
        <span class="endpoint-desc">${desc}</span>
      </div>`).join('');
    return `
      <div class="section-heading"><h2>⚡ API Endpoints</h2></div>
      <div class="api-card">${rows}</div>
      <div style="margin-top:16px;padding:14px 16px;background:var(--primary-light);border-radius:var(--radius);font-size:13px;color:var(--primary);">
        🚀 Free to use — no API key required.
      </div>`;
  }

  function emptyState(msg) {
    return `<div class="empty"><div class="empty-icon">🔍</div>${msg}</div>`;
  }
</script>
</body>
</html>
